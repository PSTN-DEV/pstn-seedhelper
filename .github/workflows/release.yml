name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: i686-pc-windows-msvc
            arch: x86

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify Cargo.toml version matches tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $cargo = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($cargo -ne $tag) {
            Write-Error "Version mismatch: Cargo.toml has '$cargo' but tag is 'v$tag'"
            exit 1
          }

      - name: Extract version and changelog
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

          $lines = Get-Content CHANGELOG.md
          $start = ($lines | Select-String "^## \[$v\]").LineNumber
          if ($start) {
            $rest = $lines[($start)..($lines.Count - 1)]
            $end = ($rest | Select-String "^## \[").LineNumber | Select-Object -First 1
            $body = if ($end) { $rest[0..($end - 2)] } else { $rest }
            $out = ($body | Where-Object { $_ -ne $null }) -join "`n"
            echo "BODY<<EOF" >> $env:GITHUB_OUTPUT
            echo $out >> $env:GITHUB_OUTPUT
            echo "EOF" >> $env:GITHUB_OUTPUT
          } else {
            echo "BODY=No changelog entry for $v." >> $env:GITHUB_OUTPUT
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            /DAppArch=${{ matrix.arch }} `
            installer.iss

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/pstn-seedhelper-${{ steps.version.outputs.VERSION }}-setup-${{ matrix.arch }}.exe
          body: ${{ steps.version.outputs.BODY }}
          prerelease: false

  cleanup:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Delete old releases
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const published = releases.filter(r => !r.draft);
            const toDelete = [];

            // Stable: keep only highest patch per minor (e.g. 4.3.1 survives, 4.3.0 dies)
            const stable = published.filter(r => !r.prerelease);
            const byMinor = {};
            for (const r of stable) {
              const m = r.tag_name.match(/^v?(\d+)\.(\d+)\.(\d+)/);
              if (!m) continue;
              const key = `${m[1]}.${m[2]}`;
              (byMinor[key] = byMinor[key] || []).push({ r, patch: parseInt(m[3]) });
            }
            for (const entries of Object.values(byMinor)) {
              entries.sort((a, b) => b.patch - a.patch);
              toDelete.push(...entries.slice(1).map(e => e.r));
            }

            // Delete all prereleases
            toDelete.push(...published.filter(r => r.prerelease));

            for (const release of toDelete) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              core.info(`Deleted: ${release.tag_name}`);
            }
