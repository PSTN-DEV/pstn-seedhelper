name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: i686-pc-windows-msvc
            arch: x86

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          if ($v -match "-beta") {
            echo "IS_PRERELEASE=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "IS_PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            /DAppArch=${{ matrix.arch }} `
            installer.iss

      # ── Signing (add after SignPath project is approved) ──────────────────
      # - name: Sign installer
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: pstn-seedhelper
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: installer
      #     github-artifact-name: installer
      #     wait-for-completion: true
      #     output-artifact-directory: Output
      # ─────────────────────────────────────────────────────────────────────

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/pstn-seedhelper-${{ steps.version.outputs.VERSION }}-setup-${{ matrix.arch }}.exe
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE == 'true' }}

  cleanup:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
