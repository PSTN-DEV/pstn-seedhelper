name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: i686-pc-windows-msvc
            arch: x86

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          if ($v -match "-beta") {
            echo "IS_PRERELEASE=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "IS_PRERELEASE=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            /DAppArch=${{ matrix.arch }} `
            installer.iss

      - name: Sign installer
        if: steps.version.outputs.IS_PRERELEASE == 'false'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: pstn-seedhelper
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-name: installer
          wait-for-completion: true
          output-artifact-directory: Output

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/pstn-seedhelper-${{ steps.version.outputs.VERSION }}-setup-${{ matrix.arch }}.exe
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE == 'true' }}

  archive:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Archive old releases
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const published = releases
              .filter(r => !r.draft)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const stable     = published.filter(r => !r.prerelease);
            const prerelease = published.filter(r =>  r.prerelease);

            const toArchive = [
              ...stable.slice(3),
              ...prerelease.slice(3),
            ];

            for (const release of toArchive) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: true,
              });
              core.info(`Archived: ${release.tag_name}`);
            }
